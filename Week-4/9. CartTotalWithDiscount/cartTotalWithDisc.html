<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Total with Discounts</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 650px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 1rem;
        }

        button {
            flex: 1;
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
            text-align: left;
            font-size: 1.1rem;
        }

        .receipt {
            font-family: "Courier New", monospace;
            white-space: pre-line;
            line-height: 1;
            text-align: left;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .receipt span {
          width: 190px;
          display: inline-block;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Cart Total with Discounts -->
    <div class="container">

        <h1 class="proHeading">Cart Total with Discounts</h1>

        <input type="text" id="item" placeholder="Enter your product itme name Eg. Shirt">
        <input type="number" id="price" placeholder="Enter your product itme price Eg. 299">

        <div class="buttons">
            <button onclick="addItem()">Add Item</button>
            <button onclick="printReceipt()"">Print Receipt</button>
        </div>

        <div id="result">
        </div>

        <p class="receipt"></p>

    </div>

    <!-- javascript part -->
    <script src="/Week-4/9. CartTotalWithDiscount/solution.js"></script>

</body>

</html>
