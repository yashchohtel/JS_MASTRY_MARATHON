<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Classifier</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }


        .head {
            font-size: 1.4rem;
            font-weight: 600;
            text-transform: capitalize;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 1rem;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
            flex: 1;
        }

        .gradeResult,
        .cardResult {
            margin-top: 20px;
            line-height: 1.8;
            text-align: left;
            font-size: 1rem;
        }

        .cardResult {
            margin-top: 2rem;
        }

        .reportTable {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .reportTable th,
        .reportTable td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .reportTable th {
            background: #353535;
            color: white;
        }

        .reportTable tr:nth-child(even) {
            background: #f5f5f5;
        }

        .reportTable tr:hover {
            background: #ececec;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Grade Classifier -->
    <div class="container">

        <!-- reportcard -->
        <div class="card">

            <p class="head">Class Report Generator</p>

            <input type="text" id="name" placeholder="Enter student name">
            <input type="number" id="cardMarks" placeholder="Enter Student marks out of 100">

            <div class="buttons">
                <button onclick="addStudent()">Add Student</button>
                <button onclick="printClassReport()"">Generate Report</button>
            </div>

            <div class=" cardResult">
            </div>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-4/5. Grade Classifier/solution.js"></script>

</body>

</html>
