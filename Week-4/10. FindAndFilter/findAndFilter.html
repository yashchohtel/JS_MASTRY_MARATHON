<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find and Filter</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 950px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        /* section */
        .section {
            width: 100%;
            display: flex;
            gap: 2rem;
        }

        /* both boxes */
        .findFirst,
        .filterAbove {
            flex: 1;
            padding: 1rem;
            border: 1px solid #aaa2a2;
            border-radius: 10px;
        }

        /* heading */
        .findFirst h2,
        .filterAbove h2 {
            margin-bottom: 1rem;
        }

        /* result */
        #findResult,
        #filterResult {
            margin-top: 20px;
            line-height: 1.8;
            text-align: left;
            font-size: 1rem;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Find and Filter -->
    <div class="container">

        <div class="section">

            <!-- Find First -->
            <div class="findFirst">

                <h2>Find First</h2>

                <p class="desc">Enter values separated by commas Eg. a,b,c,b</p>
                <input type="text" id="findArray" placeholder="Eg. a,b,c,b">

                <input type="text" id="target" placeholder="Enter target value Eg. b">

                <button onclick="getFirstMatch()">Find First Match</button>

                <div id="findResult"></div>

            </div>

            <!-- Filter Above -->
            <div class="filterAbove">

                <h2>Filter Above</h2>

                <p class="desc">Enter numbers separated by commas Eg. 10,25,8,40,15</p>
                <input type="text" id="numbers" placeholder="Eg. 10,25,8,40,15">

                <input type="number" id="threshold" placeholder="Enter threshold Eg. 20">

                <button onclick="getFilteredNumbers()">Filter Numbers</button>

                <div id="filterResult"></div>

            </div>

        </div>

    </div>

    <!-- javascript part -->
    <script src="/Week-4/10. FindAndFilter/solution.js"></script>

</body>

</html>
