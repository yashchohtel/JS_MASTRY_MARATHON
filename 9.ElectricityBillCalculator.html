<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greating machine</title>
    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='index.html'">
        Back To Home
    </button>

    <!-- greeting machine -->
    <div class="container">

        <h1 class="proHeading">Bill Calculator</h1>

        <input type="number" id="unit" placeholder="Enter your unit">

        <button onclick="calculateBill()">
            Calculate Bill
        </button>

        <div id="result"></div>

    </div>

    <!-- jabascript part -->
    <script>

        function calculateBill() {

            let unitInput = document.getElementById("unit").value;
            let unit = Number(unitInput);
            let result = document.getElementById("result");

            if (unitInput === "") {

                result.innerHTML = "❌ Please fill the field";

            } else if (unit < 0) {

                result.innerHTML = "❌ Unit should be greater than zero";

            } else if (unit >= 300) {

                let totalBill = (100 * 3) + (100 * 5) + (100 * 7) + ((unit - 300) * 10);

                result.innerHTML = `
                First 100 Units → ₹${100 * 3}
                <br>
                Next 100 Units → ₹${100 * 5}
                <br>
                Next 100 Units → ₹${100 * 7}
                <br>
                Above 300 Units → ₹${(unit - 300) * 10} (${unit - 300} remaining units)
                <br><br>
                ✅ Total Bill → ₹${totalBill}`;

                if (unit >= 500) {

                    result.innerHTML += `<br><br>🔥 Very High Consumption`;
                }

            } else if (unit >= 200) {

                let totalBill = (100 * 3) + (100 * 5) + ((unit - 200) * 7);

                result.innerHTML = `
                First 100 Units → ₹${100 * 3}
                <br>
                Next 100 Units → ₹${100 * 5}
                <br>
                ${unit > 200 ? `Remaining Units → ₹${(unit - 200) * 7} (${unit - 200} remaining units) <br><br>` : ""}
                ✅ Total Bill → ₹${totalBill}`;

            } else if (unit >= 100) {

                let totalBill = (100 * 3) + ((unit - 100) * 5);

                result.innerHTML = `
                First 100 Units → ₹${100 * 3}
                <br>
                ${unit > 100 ? `Remaining Units → ₹${(unit - 100) * 5} (${unit - 100} remaining units) <br><br>` : ""}
                ✅ Total Bill → ₹${totalBill}`;

            } else if (unit < 100) {

                let totalBill = unit * 3;

                result.innerHTML = `⚡ Electricity Bill → ₹${totalBill}`;
            }

        }

    </script>

</body>

</html>
