<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        h3 {
            text-align: left;
            font-size: 1.4rem;
            text-transform: capitalize;
            margin-top: 1.5rem;
        }

        .radioInput {
            display: flex;
            gap: 14px;
            margin-top: 15px;
            flex-direction: column;
        }

        .radioInput label {
            display: flex;
            align-items: center;
            gap: 8px;

            font-size: 18px;
            cursor: pointer;
        }

        .radioInput input {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .checkboxInput {
            margin-top: 15px;
        }

        .checkboxInput label {
            display: flex;
            align-items: center;
            gap: 10px;

            font-size: 18px;
            cursor: pointer;
        }

        .checkboxInput input {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;

            flex: 1;
        }

        #result {
            margin-top: rem;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Budget Tracker -->
    <div class="container">

        <form id="studentForm">

            <h1 class="proHeading">Budget Tracker</h1>

            <input type="text" id="studentName" placeholder="Enter Student Name">

            <input type="text" id="studentCity" placeholder="Enter City">

            <input type="number" id="studentAge" placeholder="Enter Age">

            <h3>Select Course</h3>

            <div class="radioInput">

                <label>
                    <input type="radio" name="course" value="Maths">
                    Maths
                </label>

                <label>
                    <input type="radio" name="course" value="Physics">
                    Physics
                </label>

                <label>
                    <input type="radio" name="course" value="Biology">
                    Biology
                </label>

            </div>

            <h3>Enrollment Status</h3>

            <div class="checkboxInput">
                <label>
                    <input type="checkbox" id="isEnrolled">
                    Student Is Enrolled
                </label>
            </div>

            <div class="buttons">

                <button type="button" onclick="addStudentData()">
                    Add Student Data
                </button>

                <button type="button" onclick="updateStudentData()">
                    Update Student Data
                </button>

            </div>


        </form>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/10. MiniBudgetTracker/solution.js"></script>

</body>

</html>
