<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            flex-direction: column;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .actBtn button {
            flex: 1;
        }

        .addExpense {
            margin-top: 30px;
        }

        .balance {
            text-align: left;
            margin: 30px 0;
            font-size: 1.3em;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Budget Tracker -->
    <div class="container">

        <h1 class="proHeading">Budget Tracker</h1>

        <p class="descHead">Add Income</p>

        <div class="inputGroup">

            <input type="text" id="incomeDescription" placeholder="Enter Income Description">

            <input type="number" id="incomeAmount" placeholder="Enter Income Amount">

        </div>

        <div class="buttons">

            <button type="button" onclick="addIncome()">
                Add Income
            </button>

        </div>

        <p class="descHead addExpense">Add Expense</p>

        <div class="inputGroup">

            <input type="text" id="expenseDescription" placeholder="Enter Expense Description">

            <input type="number" id="expenseAmount" placeholder="Enter Expense Amount">

        </div>

        <div class="buttons">

            <button type="button" onclick="addExpense()">
                Add Expense
            </button>

        </div>

        <!-- div balance -->
        <div class="balance" id="balance">Current Balance : ₹ 0</div>

        <div class="buttons actBtn">

            <button type="button" onclick="showTransactions()">
                Show Transactions
            </button>

            <button type="button" onclick="showSummary()">
                Show Summary
            </button>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/10. MiniBudgetTracker/solution.js"></script>

</body>

</html>
