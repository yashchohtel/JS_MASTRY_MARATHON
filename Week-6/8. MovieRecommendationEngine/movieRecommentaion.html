<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendar</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            gap: 0px;
            flex-direction: column;
        }

        .inputGroup input,
        .inputGroup select {
            flex: 1;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        #recommendGenre {
            margin-top: 0;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 15px;
        }

        .buttons button {
            flex: 1;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        #movieContainer {
            margin-top: 25px;
            text-align: left;
        }

        .movie {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #8f8f8f;
            font-size: 18px;
        }

        .movie label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .movie input {
            width: 18px;
            height: 18px;
            margin: 0;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Movie Recommendar -->
    <div class="container">

        <h1 class="proHeading">Movie Recommendation Engine</h1>

        <p class="descHead">Enter Movie Details</p>

        <div class="inputGroup">

            <input type="text" id="movieTitle" placeholder="Enter Movie Title">

            <select id="movieGenre">

                <option value="">Select Genre</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Horror">Horror</option>
                <option value="Sci-Fi">Sci-Fi</option>

            </select>

            <input type="number" id="movieRating" placeholder="Rating">

        </div>

        <div class="buttons">

            <button type="button" onclick="addMovie()">
                Add Movie
            </button>

        </div>

        <div id="movieContainer">

            <p id="emptyMessage">No movies yet.</p>

        </div>

        <p class="descHead">Recommend Movie</p>

        <div class="buttons">

            <select id="recommendGenre">

                <option value="">Select Genre</option>
                <option value="Action">Action</option>
                <option value="Comedy">Comedy</option>
                <option value="Drama">Drama</option>
                <option value="Horror">Horror</option>
                <option value="Sci-Fi">Sci-Fi</option>

            </select>

            <button type="button" onclick="recommend()">
                Recommend
            </button>

        </div>

        <div class="buttons">

            <button type="button" onclick="showStats()">
                Show Stats
            </button>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/8. MovieRecommendationEngine/solution.js"></script>

</body>

</html>
