<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Book</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            flex-direction: column;
        }

        .inputGroup input,
        .inputGroup select {
            flex: 1;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .buttons button {
            flex: 1;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .actionGroup {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .actionGroup input {
            flex: 1;
            margin-top: 0;
        }

        .actionGroup button {
            width: 180px;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Contact Book -->
    <div class="container">

        <h1 class="proHeading">Contact Book</h1>

        <p class="descHead">Enter Contact Details</p>

        <div class="inputGroup">

            <input type="text" id="contactName" placeholder="Enter Name">

            <input type="number" id="contactPhone" placeholder="Enter Phone Number">

            <input type="text" id="contactCity" placeholder="Enter City">

        </div>

        <div class="buttons">

            <button type="button" onclick="addContact()">
                Add Contact
            </button>

            <button type="button" onclick="showContacts()">
                Show All Contact
            </button>

        </div>

        <p class="descHead">Find Contact</p>

        <div class="actionGroup">

            <input type="text" id="findName" placeholder="Enter Name">

            <button type="button" onclick="findContact()">
                Find Contact
            </button>

        </div>

        <p class="descHead">Show By City</p>

        <div class="actionGroup">

            <input type="text" id="searchCity" placeholder="Enter City">

            <button type="button" onclick="showByCity()">
                Show By City
            </button>

        </div>

        <p class="descHead">Delete Contact</p>

        <div class="actionGroup">

            <input type="text" id="deleteName" placeholder="Enter Name">

            <button type="button" onclick="deleteContact()">
                Delete Contact
            </button>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/7. ContactBook/solution.js"></script>

</body>

</html>
