<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Scoreboard</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
            flex: 1;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Simple Scoreboard -->
    <div class="container">

        <h1 class="proHeading">Simple Scoreboard</h1>

        <p class="descHead">Add Player</p>
        <input type="text" id="playerName" placeholder="Enter Player Name">

        <div class="buttons">
            <button type="button" onclick="addPlayer()">
                Add Player
            </button>
        </div>

        <p class="descHead">Add Score</p>
        <select id="playerList">
            <option value="">Select Player</option>
        </select>

        <input type="number" id="playerPoints" placeholder="Enter Points">

        <div class="buttons">
            <button type="button" onclick="addPoints()">
                Add Points
            </button>

            <button type="button" onclick="showScoreboard()">
                Show Score
            </button>
        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/2. SimpleScoreboard/solution.js"></script>

</body>

</html>
