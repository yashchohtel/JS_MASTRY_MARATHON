<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Logger</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            gap: 10px;
        }

        .inputGroup input,
        .inputGroup select {
            flex: 1;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        #expenseTableContainer {
            margin: 25px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            display: none;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background: black;
            color: white;
        }

        #emptyMessage {
            font-size: 18px;
            padding: 20px 0;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Expense Logger -->
    <div class="container">

        <h1 class="proHeading">Expense Logger</h1>

        <p class="descHead">Enter Expense Details</p>
        <div class="inputGroup">

            <select id="expenseCategory">

                <option value="">Select Category</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Entertainment">Entertainment</option>

            </select>

            <input type="number" id="expenseAmount" placeholder="Enter Amount">

        </div>

        <input type="text" id="expenseDescription" placeholder="Enter Description">

        <div class="buttons">

            <button type="button" onclick="addExpense()">
                Add Expense
            </button>

        </div>

        <div id="expenseTableContainer">

            <p id="emptyMessage">
                No expenses added.
            </p>

            <table id="expenseTable">

                <thead>

                    <tr>

                        <th>Category</th>
                        <th>Description</th>
                        <th>Amount</th>

                    </tr>

                </thead>

                <tbody id="expenseTableBody">

                </tbody>

            </table>

        </div>

        <p class="descHead">Search By Category</p>
        <select id="filterCategory">

            <option value="">Select Category</option>
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>

        </select>

        <div class="buttons">

            <button type="button" onclick="showByCategory()">
                Show By Category
            </button>

            <button type="button" onclick="showTotal()">
                Show Total
            </button>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/6. ExpenseLogger/solution.js"></script>

</body>

</html>
