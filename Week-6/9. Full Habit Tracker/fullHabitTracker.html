<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            flex-direction: column;
        }

        .inputGroup input {
            flex: 1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .buttons button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .actBtn button {
            flex: 1;
        }

        .habitHeader {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 18px;
            padding: 12px 0;
            border-bottom: 2px solid #7d7d7d;
            margin-top: 20px;
        }

        #habitContainer {
            margin-top: 15px;
            text-align: left;
            margin-bottom: 30px;
        }

        .habit {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #8f8f8f;
            font-size: 18px;
        }

        .habit label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .habit input {
            width: 18px;
            height: 18px;
            margin: 0;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Habit Tracker -->
    <div class="container">

        <h1 class="proHeading">Habit Tracker</h1>

        <p class="descHead">Enter Habit Details</p>

        <div class="inputGroup">

            <input type="text" id="habitName" placeholder="Enter Habit Name">

            <input type="number" id="targetPerWeek" placeholder="Target Per Week">

        </div>

        <div class="buttons">

            <button type="button" onclick="addHabit()">
                Add Habit
            </button>

        </div>

        <div class="habitHeader">

            <span>Habits</span>

            <span>Today's Status</span>

        </div>

        <div id="habitContainer">

            <p id="emptyMessage">No habits yet.</p>

        </div>

        <div class="buttons actBtn">

            <button type="button" onclick="showHabits()">
                Show Habits
            </button>

            <button type="button" onclick="showStats()">
                Show Stats
            </button>

            <button type="button" onclick="resetDay()">
                Reset Day
            </button>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/9. Full Habit Tracker/solution.js"></script>

</body>

</html>
