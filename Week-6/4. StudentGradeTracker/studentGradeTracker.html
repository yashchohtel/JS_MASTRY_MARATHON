<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Tracker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            gap: 10px;
        }

        .inputGroup input {
            flex: 1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Student Grade Tracker -->
    <div class="container">

        <h1 class="proHeading">Student Grade Tracker</h1>

        <p class="descHead">Add student name and score</p>
        <div class="inputGroup">

            <input type="text" id="studentName" placeholder="Enter Student Name">

            <input type="number" id="studentScore" placeholder="Enter Score">

        </div>

        <div class="buttons">

            <button type="button" onclick="addStudent()">
                Add Student
            </button>

            <button type="button" onclick="showTopStudent()">
                Show Top Student
            </button>

        </div>

        <div class="buttons">

            <button type="button" onclick="showGradeBook()">
                Show Grade Book
            </button>

            <button type="button" onclick="updateClassAverage()">
                Show Average
            </button>

        </div>

        <div id="result"></div>

    </div>
    <!-- javascript part -->
    <script src="/Week-6/4. StudentGradeTracker/solution.js"></script>

</body>

</html>
