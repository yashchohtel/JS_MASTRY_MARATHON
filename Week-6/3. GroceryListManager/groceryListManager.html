<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List Item</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            gap: 10px;
        }

        .inputGroup input {
            flex: 1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .buttons button {
            width: 100%;
        }

        #listContainer {
            margin-top: 25px;
            text-align: left;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #8f8f8f;
            font-size: 18px;
        }

        .item label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .item input {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        #showProgressBtn {
            margin-top: 20px;
            display: none;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Grocery List Item -->
    <div class="container">

        <h1 class="proHeading">Grocery List Manager</h1>

        <div class="descHead">Add Item Detail</div>
        <div class="inputGroup">
            <input type="text" id="itemName" placeholder="Enter Item Name">
            <input type="number" id="itemQuantity" placeholder="Quantity">
        </div>

        <div class="buttons">
            <button type="button" onclick="addItem()">
                Add Item
            </button>
        </div>

        <div id="listContainer">

            <p id="emptyMessage">List is empty.</p>

        </div>

        <button type="button" id="showProgressBtn" onclick="showProgress()">
            Show Progress
        </button>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/3. GroceryListManager/solution.js"></script>

</body>

</html>
