<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .inputGroup {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .inputGroup input,
        .inputGroup select {
            flex: 1;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .addTask {
            width: 100%;
        }

        #taskContainer {
            margin-top: 15px;
            text-align: left;
        }

        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #8f8f8f;
            font-size: 18px;
        }

        .task label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .task input {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        #showSummaryBtn {
            display: none;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Task Manager -->
    <div class="container">

        <h1 class="proHeading">Task Manager</h1>

        <p class="descHead">Add task and its priority</p>
        <div class="inputGroup">

            <input type="text" id="taskTitle" placeholder="Enter Task Title">

            <select id="taskPriority">

                <option value="">Select Priority</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>

            </select>

        </div>

        <div class="buttons">

            <button class="addTask" type="button" onclick="addTask()">
                Add Task
            </button>

        </div>

        <div id="taskContainer">

            <p id="emptyMessage">No tasks available.</p>

        </div>

        <div class="inputGroup">

            <select id="filterPriority">

                <option value="">Select Priority</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>

            </select>

            <button type="button" onclick="showByPriority()">
                Show By Priority
            </button>

        </div>

        <button type="button" id="showSummaryBtn" onclick="showSummary()">
            Show Summary
        </button>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-6/5. TaskManager/solution.js"></script>

</body>

</html>
