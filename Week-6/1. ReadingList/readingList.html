<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading List</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
            flex: 1;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Reading List -->
    <div class="container">

        <h1 class="proHeading">Reading List</h1>

        <input type="text" id="bookName" placeholder="Enter Book Name">

        <input type="text" id="authorName" placeholder="Enter Author Name">

        <div class="buttons">

            <button type="button" onclick="addBook()">
                Add Book
            </button>

            <button type="button" onclick="showList()">
                Show List
            </button>

        </div>

        <div id="result"></div>

    </div>
    <!-- javascript part -->
    <script src="/Week-6/1. ReadingList/solution.js"></script>

</body>

</html>
