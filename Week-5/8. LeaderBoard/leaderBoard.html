<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Board</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            margin: 3rem auto 4rem;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .btnRow {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .searchRow {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .searchRow button {
            flex: 1;
        }

        .leaderboardCards {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .leaderboardCard {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
        }

        .leaderboardCard p {
            margin: 6px 0;
            font-size: 16px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: black;
            color: white;
            padding: 12px;
            font-size: 16px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Leader Board -->
    <div class="container">

        <h1 class="proHeading">Leaderboard Management</h1>

        <h3 class="descHead">Enter Play Name & Score</h3>
        <input type="text" id="playerName" placeholder="Enter Player Name">

        <input type="number" id="playerScore" placeholder="Enter Player Score">

        <div class="btnRow">
            <button id="addPlayerBtn" onclick="addPlayer()">Add Player</button>
            <button id="showLeaderboardBtn" onclick="showLeaderboard()">Show Leaderboard</button>
        </div>

        <div class="searchRow">
            <button id="topThreeBtn" onclick="getTopThree()">Get Top 3 Players</button>
        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-5/8. LeaderBoard/solution.js"></script>

</body>

</html>
