<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Score Tracker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 650px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        .descHead {
            text-align: left;
            margin-top: 1rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        .startBtn {
            width: 100%;
            margin-top: 10px;
        }

        .quizActions {
            display: flex;
            gap: 10px;
        }

        .quizActions button {
            margin-top: 10px;
            flex: 1;
        }


        /* #result {
            margin-top: 20px;
            line-height: 1.8;
        } */
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Quiz Score Tracker -->
    <div class="container">

        <h1 class="proHeading">Quiz Score Tracker</h1>

        <!-- Player Name -->
        <h3 class="descHead">Player Name</h3>

        <input type="text" id="playerName" placeholder="Enter Player Name">

        <button class="startBtn" onclick="startQuiz()">
            Start Quiz
        </button>

        <!-- Quiz Actions -->
        <h3 class="descHead">Quiz Actions</h3>

        <div class="quizActions">

            <button onclick="submitAnswer(true)">
                Correct Answer
            </button>

            <button onclick="submitAnswer(false)">
                Wrong Answer
            </button>

        </div>

        <button onclick="showResult()">
            Show Result
        </button>

        <!-- Result -->
        <div class="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-5/6. Quiz Score Tracker/solution.js"></script>

</body>

</html>
