<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Splitter</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            border-radius: 20px;
            margin: 3rem auto;
        }

        h3 {
            text-align: left;
            margin: 20px 0 10px;
            font-size: 1.3rem;
        }

        .inputRow {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .inputRow input,
        .inputRow select {
            flex: 1;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
            white-space: nowrap;
        }

        .fullBtn {
            width: 100%;
            margin-top: 18px;
        }

        .descHead {
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Expense Splitter -->
    <div class="container">

        <h1 class="proHeading">Expense Splitter</h1>

        <p class="descHead">Trip Name</p>

        <div class="inputRow">

            <input type="text" id="tripName" placeholder="Enter Trip Name">

            <button id="createTripBtn" onclick="addTripName()">
                Create Trip
            </button>

        </div>

        <p class="descHead">Add Member</p>

        <div class="inputRow">

            <input type="text" id="memberName" placeholder="Enter Member Name">

            <button id="addMemberBtn" onclick="addMember()">
                Add Member
            </button>

        </div>

        <p class="descHead">Add Expense</p>

        <div class="inputRow">

            <select id="paidBy">
                <option value="">Paid By</option>
            </select>

            <input type="text" id="expenseName" placeholder="Expense Name">

        </div>

        <div class="inputRow">

            <input type="number" id="expenseAmount" placeholder="Expense Amount">

            <button id="addExpenseBtn" onclick="addExpense()">
                Add Expense
            </button>

        </div>

        <button class="fullBtn" id="showSummaryBtn" onclick="showSummary()">
            Show Summary
        </button>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-5/10. Expense Splitter/solution.js"></script>

</body>

</html>
