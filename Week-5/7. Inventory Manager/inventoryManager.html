<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            margin: 3rem auto 4rem;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .btnRow,
        .searchRow {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .searchRow input {
            margin-top: 0;
            flex: 1;
        }

        .searchRow button {
            flex: 0.8;
        }

        .inventoryCards {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .inventoryCard {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
        }

        .inventoryCard p {
            margin: 6px 0;
            font-size: 16px;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Inventory Manager -->
    <div class="container">

        <h1 class="proHeading">Inventory Management</h1>

        <h3 class="descHead">Enter items detail</h3>
        <input type="text" id="itemName" placeholder="Enter Item Name">

        <input type="number" id="itemPrice" placeholder="Enter Item Price">

        <input type="number" id="itemQuantity" placeholder="Enter Item Quantity">

        <div class="btnRow">
            <button id="addItemBtn" onclick="addItem()">Add Item</button>
            <button id="showInventoryBtn" onclick="showInventory()">Show Inventory</button>
        </div>

        <h3 class="descHead">Find item</h3>
        <div class="searchRow">
            <input type="text" id="findItemInput" placeholder="Enter Item Name">
            <button id="findItemBtn" onclick="findItem()">Find Item</button>
        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-5/7. Inventory Manager/solution.js"></script>

</body>

</html>
