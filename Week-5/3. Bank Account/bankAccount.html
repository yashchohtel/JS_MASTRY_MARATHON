<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Account</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        h3 {
            text-align: left;
            font-size: 1.4rem;
            margin-top: 1.5rem;
        }

        .bankbtn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Bank Account -->
    <div class="container">

        <h1 class="proHeading">Bank Account</h1>

        <!-- Deposit Section -->
        <h3>Deposit Money</h3>

        <input type="number" id="depositAmount" placeholder="Enter Deposit Amount">

        <button class="bankbtn" onclick="depositMoney()">
            Deposit
        </button>

        <!-- Withdraw Section -->
        <h3>Withdraw Money</h3>

        <input type="number" id="withdrawAmount" placeholder="Enter Withdraw Amount">

        <button class="bankbtn" onclick="withdrawMoney()">
            Withdraw
        </button>

        <!-- Balance -->
        <button class="bankbtn" onclick="showBankBalance()">
            Show Balance
        </button>

        <div id="result"></div>

    </div>
    <!-- javascript part -->
    <script src="/Week-5/3. Bank Account/solution.js"></script>

</body>

</html>
