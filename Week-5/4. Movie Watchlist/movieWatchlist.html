<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-direction: column;
        }

        button {
            flex: 1;
            padding: 12px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Movie Watchlist -->
    <div class="container">

        <h1 class="proHeading">Movie Watch List</h1>

        <input type="text" id="movieName" placeholder="Enter Movie Name">

        <input type="text" id="movieGenre" placeholder="Enter Movie Genre">

        <div class="buttons">

            <button onclick="addMovie()">
                Add Movie
            </button>

            <button onclick="showMovieList()">
                Show Total Movies
            </button>

            <button onclick="searchByGenre()">
                Search By Genre
            </button>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-5/4. Movie Watchlist/solution.js"></script>

</body>

</html>
