<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        h3 {
            text-align: left;
            font-size: 1.4rem;
            text-transform: capitalize;
            margin-top: 1.5rem;
        }

        .checkboxInput {
            margin-top: 15px;
        }

        .checkboxInput label {
            display: flex;
            align-items: center;
            gap: 10px;

            font-size: 18px;
            cursor: pointer;
        }

        .checkboxInput input {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;

            flex: 1;
        }

        .uploadBtn {
            display: block;
            width: 100%;

            margin-top: 10px;
            padding: 12px;

            background: white;
            border-radius: 10px;

            font-size: 16px;
            text-align: center;
            cursor: pointer;

            transition: 0.2s ease;
        }

        .uploadBtn:hover {
            background: #efefef;
        }

        #preview {
            width: 100%;
            height: 250px;
            object-fit: contain;
            margin-top: 15px;
            border-radius: 10px;
            background: white;
        }

        .productCard {
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-top: 2rem;
        }

        .productCard img {
            width: 100%;
            object-fit: contain;
            height: 300px;
        }

        .productDetail {
            padding: 1rem;
            text-align: left;
        }

        .productName {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .productPrice {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .productRating {
            margin-bottom: 8px;
        }

        .productStock {
            font-weight: 600;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Product Card -->
    <div class="container">

        <form id="productForm">

            <h1 class="proHeading">Product Card</h1>

            <input type="text" id="productName" placeholder="Enter Product Name">

            <input type="number" id="productPrice" placeholder="Enter Product Price">

            <input type="number" id="productRating" placeholder="Enter Product Rating out of 5">

            <!-- ------------- -->

            <label for="productImage" class="uploadBtn">
                Select Product Image
            </label>

            <input type="file" id="productImage" accept="image/*" hidden>

            <img id="preview" style="display: none;">

            <div class="checkboxInput">
                <label>
                    <input type="checkbox" id="inStock">
                    Product In Stock
                </label>
            </div>

            <!-- --------------- -->

            <div class="buttons">

                <button type="button" onclick="showProductCard()">
                    Show Product Card
                </button>

            </div>

        </form>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-5/2. Product Card/solution.js"></script>

</body>

</html>
