<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooping Card</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/Week-5/9. Shopping Cart/shoopingCart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- heaading -->
    <h1 class="proHeading">Shoping Cart</h1>

    <!-- SHOOPING CARD -->
    <div class="container">

        <!-- Products Page -->
        <div id="productsPage">

            <div class="pageHeader">
                <h2>Browse Products</h2>

                <div class="cartIcon" id="openCartBtn">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartCount">0</span>
                </div>

            </div>

            <!-- rule -->
            <hr>

            <div id="productsList">

            </div>

        </div>

        <!-- Cart Page -->
        <div id="cartPage">

            <div class="couponWrapper">

                <div id="backToProducts" class="backIcon">
                    <i class="fa-solid fa-arrow-left"></i>
                </div>

                <div class="couponSection">

                    <input type="number" id="couponInput" placeholder="Discount %">

                    <button id="applyCouponBtn">
                        Apply
                    </button>

                </div>

            </div>

            <div id="cartItems">

            </div>

            <div class="cartSummary">

                <p><strong>Total Items :</strong> <span id="itemCount">0</span></p>

                <p><strong>Total Price :</strong> ₹<span id="totalPrice">0</span></p>

            </div>

            <div class="cartButtons">

                <button id="showCartBtn">
                    Show Receipt
                </button>

                <button id="clearCartBtn">
                    Clear Cart
                </button>

            </div>

            <div id="result"></div>

        </div>

    </div>

    <!-- javascript part -->
    <script src="/Week-5/9. Shopping Cart/solution.js"></script>

</body>

</html>
