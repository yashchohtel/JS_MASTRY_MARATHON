<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even Odd Checker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
            text-align: left;
        }

        h3 {
            text-align: left;
            font-size: 1.4rem;
            text-transform: capitalize;
        }

        .radioInput {
            display: flex;
            gap: 14px;
            margin-top: 20px;
            margin-bottom: 20px;
            flex-direction: column;
        }

        .checkboxInput {
            flex-direction: column;
        }

        .radioInput label {
            display: flex;
            align-items: center;
            gap: 8px;

            font-size: 18px;
            cursor: pointer;
        }

        .radioInput input {
            width: 18px;
            height: 18px;

            margin: 0;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Even Odd Checker -->
    <div class="container">

        <h1 class="proHeading">Order You Pizza</h1>

        <!-- pizza size -->
        <h3>Select pizza size</h3>
        <div class="radioInput">

            <label>
                <input type="radio" name="pizzaSize" value="small">
                small ₹199
            </label>

            <label>
                <input type="radio" name="pizzaSize" value="medium">
                Medium ₹299
            </label>

            <label>
                <input type="radio" name="pizzaSize" value="large">
                Large ₹399
            </label>

        </div>

        <!-- select toppings -->
        <h3>Select Toppings (5 max)</h3>
        <div class="radioInput checkboxInput">

            <label>
                <input type="checkbox" name="topping" value="cheese">
                Extra Cheese ₹40
            </label>

            <label>
                <input type="checkbox" name="topping" value="paneer">
                Paneer ₹40
            </label>

            <label>
                <input type="checkbox" name="topping" value="corn">
                Corn ₹40
            </label>

            <label>
                <input type="checkbox" name="topping" value="onion">
                Onion ₹40
            </label>

            <label>
                <input type="checkbox" name="topping" value="olive">
                Olive ₹40
            </label>

            <label>
                <input type="checkbox" name="topping" value="mushroom">
                Mushroom ₹40
            </label>

            <label>
                <input type="checkbox" name="topping" value="jalapeno">
                Jalapeno ₹40
            </label>

            <label>
                <input type="checkbox" name="topping" value="capsicum">
                Capsicum ₹40
            </label>

        </div>

        <!-- Delivery Type -->
        <h3>Delivery Type</h3>
        <div class="radioInput">

            <label>
                <input type="radio" name="deliveryType" value="pickup">
                Pickup (Free)
            </label>

            <label>
                <input type="radio" name="deliveryType" value="homeDelivery">
                Home Delivery ₹40 (free for orders above ₹500)
            </label>

        </div>

        <button onclick="orderPizza()">
            Place Order
        </button>

        <div id="result"></div>


        <!-- javascript part -->
        <script src="/4. pizzaOrderValidation/solution.js"></script>

</body>

</html>
