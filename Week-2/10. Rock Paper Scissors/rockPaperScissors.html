<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even Odd Checker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .proHeading {
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        /* items div */
        .items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        /* item */
        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            background: #cbcbcb;
            padding: 15px 10px;
            border-radius: 5px;
            justify-content: space-between;
        }

        .item label {
            width: 30%;
            display: inline-flex;
            gap: 10px;
            font-size: 18px;
            align-items: center;
            user-select: none;
        }

        .item input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .item .stock {
            font-size: 18px;
            width: 30%;
        }

        .item .stock .stockCount {
            font-weight: bold;
        }

        .item input[type="number"] {
            width: 30%;
            padding: 6px;
            font-size: 1rem;
            outline: none;
            border-radius: 10px;
            border: none;
        }

        #moneyInput {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #error {
            margin-top: 20px;
            line-height: 1.8;
            text-align: left;
        }

        .scoreBoard {
            width: 100%;
            background: #c7c7c7;
            height: 142px;
            border-radius: 1rem;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Even Odd Checker -->
    <div class="container">

        <h1 class="proHeading">Rock Paper Scissors</h1>

        <div class="scoreBoard">

        </div>

        <div id="error"></div>

    </div>

    <!-- javascript part -->
    <script src="/10. Rock Paper Scissors/solution.js"></script>

</body>

</html>
