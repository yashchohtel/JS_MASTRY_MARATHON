<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even Odd Checker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .proHeading {
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .movesButton {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        button {
            padding: 12px 25px;
            user-select: none;
            border: 2px solid black;
            border-radius: 10px;
            background: black;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s ease;
        }

        button:hover {
            background: white;
            color: black;
            border-color: black;
        }

        #error {
            margin-top: 20px;
            line-height: 1.8;
            text-align: left;
        }

        .scoreBoard {
            width: 100%;
            background: #c7c7c7;
            height: 142px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
        }

        .you {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .rule {
            width: 2px;
            height: 72%;
            background: red;
        }

        .computer {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .you span,
        .computer span {
            text-transform: uppercase;
            font-size: 1rem;
            font-weight: 700;
        }

        .myscore,
        .computerScore {
            font-size: 2rem;
            margin-top: 1rem;
        }

        .matchcount {
            margin-bottom: 1rem;
        }

        .moves {
            width: 100%;
            background: #9a9a9a;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            border-radius: 14px;
            padding: 1rem;
        }

        .move {
            height: 100%;
            width: 40%;
        }

        .moves .userMove,
        .moves .computerMove {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0.5rem 0;
        }

        #result, #final {
            margin-top: 25px;
            font-size: 1.2rem;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Even Odd Checker -->
    <div class="container">

        <h1 class="proHeading">Rock Paper Scissors</h1>

        <p class="matchcount">MATCH COUNT - 0</p>

        <div class="scoreBoard">

            <div class="you">

                <span>YOU</span>
                <div class="myscore">0</div>

            </div>

            <div class="rule">

            </div>

            <div class="computer">

                <span>computer</span>
                <div class="computerScore">0</div>

            </div>

        </div>

        <div class="moves">

            <div class="move">
                <p class="parti">👤</p>
                <p class="userMove"></p>
            </div>

            <p>VS</p>

            <div class="move">
                <p class="parti">💻</p>
                <p class="computerMove"></p>
            </div>

        </div>

        <div id="result"></div>
        <div id="final"></div>

        <div class="movesButton">

            <button onclick="playGame('rock')">ROCK 🪨</button>
            <button onclick="playGame('paper')">PAPER 📃</button>
            <button onclick="playGame('scissors')">SCISSOR ✂️</button>

        </div>



    </div>

    <!-- javascript part -->
    <script src="/Week-2/10. Rock Paper Scissors/solution.js"></script>

</body>

</html>
