<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even Odd Checker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .proHeading {
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
            text-align: left;
        }

        select {
            padding: 10px 10px;
            border: 1px solid #999;
            border-radius: 4px;
            font-size: 17px;
            background: white;
            width: 100%;
            outline: none;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Even Odd Checker -->
    <div class="container">

        <h1 class="proHeading">The Day Activity Recommender</h1>

        <select id="weekDay">
            <option value="">Select Day</option>
            <option value="monday">Monday</option>
            <option value="tuesday">Tuesday</option>
            <option value="wednesday">Wednesday</option>
            <option value="thursday">Thursday</option>
            <option value="friday">Friday</option>
            <option value="saturday">Saturday</option>
            <option value="sunday">Sunday</option>
        </select>

        <div class="buttons">

            <button onclick="suggestActivity()">Recommend</button>

        </div>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/7. TheDayActivityRecommender/solution.js"></script>

</body>

</html>
