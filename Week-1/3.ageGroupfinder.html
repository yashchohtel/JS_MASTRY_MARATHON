<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greating machine</title>
    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
            text-transform: capitalize;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
        }
        
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='index.html'">
        Back To Home
    </button>

    <!-- greeting machine -->
    <div class="container">

        <h1 class="proHeading">Age Group Finder</h1>

        <input type="number" id="age" placeholder="Enter your age">

        <button onclick="findAgeGroup()">
            Find Age Group
        </button>

        <div id="result"></div>

    </div>

    <!-- jabascript part -->
    <script>

        function findAgeGroup() {

            let ageInput = document.getElementById("age").value;
            let age = Number(ageInput);
            let result = document.getElementById("result");

            if (ageInput === "") {
                result.innerHTML = "please fill the field";
            } else if (isNaN(age)) {
                result.innerHTML = "please enter a valid age";
            } else if (age == 0) {
                result.innerHTML = "first get born 😂😂";
            } else if (age == 12) {
                result.innerHTML = "you just entered your teenage";
            } else if (age == 18) {
                result.innerHTML = "you just became an adult";
            } else if (age == 60) {
                result.innerHTML = "you just became a senior citizen";
            } else if (age > 0 && age < 12) {
                result.innerHTML = "you are just a CHILD 👶🍼";
            } else if (age > 12 && age < 18) {
                result.innerHTML = "you are in your teen";
            } else if (age > 18 && age < 60) {
                result.innerHTML = "Now you are an adult";
            } else if (age >= 100) {
                result.innerHTML = "death is near 💀";
            } else if (age > 60) {
                result.innerHTML = "hello uncle/aunty you are a Senior citizen";
            }
        }

    </script>

</body>

</html>
