<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greating machine</title>
    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
            text-transform: capitalize;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- greeting machine -->
    <div class="container">

        <h1 class="proHeading">Age Group Finder</h1>

        <input type="number" id="age" placeholder="Enter your age">

        <button onclick="findAgeGroup()">
            Find Age Group
        </button>

        <div id="result"></div>

    </div>

    <!-- jabascript part -->
    <script src="/Week-1/3. AgeGroupFinder/solution.js"> </script>

</body>

</html>
