<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greating machine</title>
    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='index.html'">
        Back To Home
    </button>

    <!-- greeting machine -->
    <div class="container">

        <h1 class="proHeading">Find biggest number</h1>

        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">

        <button onclick="findBiggestNumber()">
            Find Biggest Number
        </button>

        <div id="result"></div>

    </div>

    <!-- jabascript part -->
    <script>

        function findBiggestNumber() {

            let num1Input = document.getElementById("num1").value;
            let num2Input = document.getElementById("num2").value;

            let num1 = Number(num1Input);
            let num2 = Number(num2Input);

            let result = document.getElementById("result");


            if (num1Input === "" || num2Input === "") {

                result.innerHTML = "❌ Please fill the field";

            } else if (isNaN(num1) || isNaN(num2)) {

                result.innerHTML = "❌ Please enter a valid number";

            } else if (num1 === num2) {

                result.innerHTML = "🤝 Both numbers are equal";

            } else if (num1 > num2) {

                result.innerHTML = `✅ ${num1} is bigger and ${num2} is smaller`;

            } else if (num1 < num2) {

                result.innerHTML = `✅ ${num1} is smaller and ${num2} is bigger`;

            }

        }

    </script>

</body>

</html>
