<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength checker</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 600px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 20px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
        }

        p {
            text-align: left;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Password Strength checker -->
    <div class="container">

        <h1 class="proHeading">Password Strength checker</h1>

        <P>• You have only 3 attempts.</P>
        <P>• password should 8 characters, must have one uppercase letter, one digit.</P>

        <input type="text" id="password" placeholder="Please enter you password here...">

        <button onclick="checkStrength()">
            Check
        </button>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-3/9. Password Strength Checker with Retry Limit/solution.js"></script>

</body>

</html>
