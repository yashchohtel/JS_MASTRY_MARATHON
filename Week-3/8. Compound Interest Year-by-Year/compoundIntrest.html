<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Intrest</title>

    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        body {
            margin-bottom: 5rem;
        }

        .container {
            width: 600px;
            padding: 30px 60px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        label {
            font-size: 1.2rem;
            margin-top: 1rem;
        }

        label[for="intrest"] {
            margin-bottom: 2.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result, #total {
            margin-top: 20px;
            line-height: 1.8;
        }

        /* __________________________________ */

        .rangeBox {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
        }

        .tooltip {
            position: absolute;
            top: -30px;
            left: 0;
            transform: translateX(-50%);
            background: #525e54;
            color: #ffffff;
            padding: 6px 15px;
            border-radius: 10px;
            font-weight: 400;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -16px;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #525e54;
            border-bottom: 8px solid transparent;
        }

        input[type="range"] {
            padding: 5px 0;
            width: 100%;
            cursor: pointer;
        }

        .rangeBox .minMax {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
    </style>


</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='/index.html'">
        Back To Home
    </button>

    <!-- Compound Intrest -->
    <div class="container">

        <h1 class="proHeading">Compound Intrest Calculator</h1>

        <div class="input-group">
            <label for="amount">Principal Amount</label>
            <input type="number" id="amount" placeholder="Enter amount">
        </div>

        <div class="input-group">
            <label class="tenure" for="tenure">Tenure (Years)</label>
            <input type="number" id="tenure" placeholder="Enter years">
        </div>

        <div class="input-group">
            <label for="intrest">Intrest Rate (%)</label>

            <div class="rangeBox">

                <div class="tooltip" id="tooltip"> 8% </div>

                <input type="range" id="rateRange" min="0" max="20" step="0.1" value="8">

                <div class="minMax">
                    <span class="min">0%</span>
                    <span class="max">20%</span>
                </div>

            </div>

            <input type="number" id="rateInput" min="0" max="20" value="8">
        </div>

        <button onclick="calculateTotal()">
            View Returns
        </button>

        <div id="result"></div>
        <div id="total"></div>

    </div>

    <!-- javascript part -->
    <script src="/Week-3/8. Compound Interest Year-by-Year/solution.js"></script>

</body>

</html>
