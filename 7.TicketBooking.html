<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greating machine</title>
    <link rel="stylesheet" href="/style.css">

    <!-- style -->
    <style>
        .container {
            width: 550px;
            padding: 30px;
            background: #bfb6b6;
            backdrop-filter: blur(8px);
            border-radius: 20px;
            text-align: center;
            margin: 0 auto;
            margin-top: 3rem;
        }

        .proHeading {
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .radioInput {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 20px;
            flex-direction: column;
        }

        .radioInput label {
            display: flex;
            align-items: center;
            gap: 8px;

            font-size: 18px;
            cursor: pointer;
        }

        .radioInput input {
            width: 18px;
            height: 18px;

            margin: 0;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;

            border: none;
            border-radius: 10px;

            background: black;
            color: white;

            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 20px;
            line-height: 1.8;
        }
    </style>

</head>

<body>

    <!-- back button -->
    <button class="backButton" onclick="window.location.href='index.html'">
        Back To Home
    </button>

    <!-- greeting machine -->
    <div class="container">

        <h1 class="proHeading">Ticket Booking</h1>

        <input type="number" id="age" placeholder="Enter your age">

        <div class="radioInput">

            <label>
                <input type="radio" name="show" value="matinee">
                Matinee (20% OFF)
            </label>

            <label>
                <input type="radio" name="show" value="evening">
                Evening
            </label>

        </div>

        <button onclick="getTicketPrice()">
            Book Ticket
        </button>

        <div id="result"></div>

    </div>

    <!-- javascript part -->
    <script>

        function getTicketPrice() {

            let ageInput = document.getElementById("age").value;
            let age = Number(ageInput);
            let selectedShow = document.querySelector('input[name="show"]:checked');
            let showTime = "";
            let result = document.getElementById("result");

            let childSeniorPrice = 100;
            let everyoneElsePrice = 250;
            let matineeDiscount = 20; // 20%
            let childSeniorMatineeDisPrice = childSeniorPrice - (childSeniorPrice * matineeDiscount / 100);
            let everyoneElseMatineeDisPrice = everyoneElsePrice - (everyoneElsePrice * matineeDiscount / 100);

            if (ageInput == "" || !selectedShow) {
                result.innerHTML = "🥹 Please enter your age and select a show time.";
                return;
            } else if (age <= 0) {
                result.innerHTML = "🙄 please enter a valid age.";
                return;
            } else if (age < 12 || age > 60) {

                showTime = selectedShow.value;

                if (showTime === "matinee") {

                    result.innerHTML = `
                    Base Price - ₹${childSeniorPrice}
                    <br>
                    Matinee Discount - ${matineeDiscount}%
                    <br>
                    Final Price - ₹${childSeniorMatineeDisPrice}`;

                } else {

                    result.innerHTML = `
                    Base Price - ₹${childSeniorPrice}
                    <br>
                    Matinee Discount - 0%
                    <br>
                    Final Price - ₹${childSeniorPrice}`;
                }

            } else if (age >= 12 && age <= 60) {

                showTime = selectedShow.value;

                if (showTime === "matinee") {

                    result.innerHTML = `
                    Base Price - ₹${everyoneElsePrice}
                    <br>
                    Matinee Discount - ${matineeDiscount}%
                    <br>
                    Final Price - ₹${everyoneElseMatineeDisPrice}`;

                } else {

                    result.innerHTML = `
                    Base Price - ₹${everyoneElsePrice}
                    <br>
                    Matinee Discount - 0%
                    <br>
                    Final Price - ₹${everyoneElsePrice}`;
                }

            }

        }

    </script>

</body>

</html>
